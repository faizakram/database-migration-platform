server:
  port: ${SERVER_PORT:8090}

spring:
  application:
    name: migration-platform
  datasource:
    url: ${METADATA_DB_URL:jdbc:postgresql://localhost:5432/migration_platform}
    username: ${METADATA_DB_USER:postgres}
    password: ${METADATA_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

# Kafka Connect REST endpoint the control plane proxies (data plane management)
platform:
  connect:
    base-url: ${KAFKA_CONNECT_URL:http://localhost:8083}
    # Bootstrap servers as seen FROM Kafka Connect (used in generated source schema-history config).
    kafka-bootstrap: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
  crypto:
    # AES-256 key (base64, 32 bytes). MUST be overridden in any real environment.
    # Seeds the Security epic (#43): connection secrets are encrypted at rest, never returned by the API.
    key: ${PLATFORM_CRYPTO_KEY:ZGV2LW9ubHktMzJieXRlLWtleS1jaGFuZ2UtbWUhIQ==}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.migration.platform: INFO
